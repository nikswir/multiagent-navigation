# A `train` option — must satisfy TrainConfig in config_schema.py.
# expl_noise is the INITIAL exploration noise: it decays at runtime toward
# expl_min over expl_decay_steps. n_robots is the curriculum's active-robot
# cap, reached after max_robots_timestamp timesteps (env capacity stays 16).
seed: 10
max_timesteps: 1000000
eval_freq: 5000
eval_ep: 100
max_ep: 500
expl_noise: 1.0
expl_min: 0.1
expl_decay_steps: 500000
n_robots: 4
max_robots_timestamp: 400000
buffer_size: 600000
random_near_obstacle: false
save_model: true
load_model: false
file_name: TD3_simpleEnv
