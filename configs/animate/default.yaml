# An `animate` option — must satisfy AnimateConfig in config_schema.py.
# results_dir / models_dir / file_name (train group) form the checkpoint
# contract shared with training: viz loads the best epoch found in
# {results_dir}/{file_name} and weights {models_dir}/{file_name}_epoch-{N}.
n_robots: 10
max_steps: 200
interval: 50
fig_width: 8.0
fig_height: 8.0
seed: 1
results_dir: results
models_dir: pytorch_models
report_csv: report.csv
